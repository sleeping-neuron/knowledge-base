<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}知识库{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true,
            },
            options: {
                ignoreHtmlClass: 'no-math',
                processHtmlClass: 'markdown-body',
            },
        };
    </script>
    <script id="MathJax-script" defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <script>
        // 立即加载主题，避免闪白
        (function(){
            const t = localStorage.getItem('kb-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    <style>{{ pygments_css | safe }}</style>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="min-h-screen antialiased" x-data="app()">

    <!-- 背景光晕（仅深色模式） -->
    <div class="fixed inset-0 -z-10 pointer-events-none">
        <div class="absolute inset-0 theme-bg"></div>
        <div class="absolute top-0 -left-20 w-[500px] h-[500px] rounded-full blur-[130px] theme-glow-1"></div>
        <div class="absolute bottom-0 right-0 w-[400px] h-[400px] rounded-full blur-[130px] theme-glow-2"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] rounded-full blur-[150px] theme-glow-3"></div>
    </div>

    <!-- 顶栏 -->
    <header class="sticky top-0 z-30 theme-header border-b">
        <div class="flex items-center h-14 px-5 gap-3">
            <a href="/" class="flex items-center gap-2.5 group shrink-0">
                <svg class="w-7 h-7 text-[var(--accent)] group-hover:opacity-80 transition-opacity duration-300" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"/>
                </svg>
                <span class="text-lg font-semibold tracking-tight theme-text-primary" data-i18n="appName">知识库</span>
            </a>

            <div class="flex-1"></div>

            <!-- 工具栏按钮 -->
            <div class="flex items-center gap-1">
                <!-- AI -->
                <a href="/ai" class="toolbar-btn group" title="AI">
                    <svg class="w-4.5 h-4.5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.455 2.456L21.75 6l-1.036.259a3.375 3.375 0 00-2.455 2.456z"/>
                    </svg>
                    <span class="hidden sm:inline text-xs font-medium">AI</span>
                </a>

                <!-- AI 设置 -->
                <button @click="showAiSettings = true" class="toolbar-btn" title="AI 设置">
                    <svg class="w-4.5 h-4.5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 010 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 010-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>

                <!-- 语言切换 -->
                <button @click="toggleLang()" class="toolbar-btn" :title="lang === 'zh' ? 'Switch to English' : '切换到中文'">
                    <span class="text-xs font-bold tracking-tight w-5 text-center" x-text="lang === 'zh' ? 'EN' : '中'"></span>
                </button>

                <!-- 主题切换 -->
                <button @click="toggleTheme()" class="toolbar-btn" :title="theme === 'dark' ? '切换浅色模式' : 'Switch to dark mode'">
                    <!-- 太阳图标 -->
                    <svg x-show="theme === 'dark'" class="w-4.5 h-4.5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="4"/><path stroke-linecap="round" d="M12 2v2m0 16v2m-6-16l1.5 1.5m9 9l1.5 1.5M4 12H2m20 0h-2m-2.5-5.5L19 8m-1.5 9.5L19 16"/>
                    </svg>
                    <!-- 月亮图标 -->
                    <svg x-show="theme === 'light'" class="w-4.5 h-4.5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/>
                    </svg>
                </button>

                <!-- 新建 -->
                <a href="/new" class="rounded-xl text-sm font-medium text-white
                          bg-gradient-to-r from-indigo-500 to-violet-500
                          hover:from-indigo-400 hover:to-violet-400
                          shadow-lg shadow-indigo-500/20 hover:shadow-indigo-500/35
                          transition-all duration-300 hover:scale-[1.02] active:scale-[0.98]
                          inline-flex items-center gap-1.5 px-4 py-1.5">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
                    </svg>
                    <span data-i18n="newNote">新建笔记</span>
                </a>
            </div>
        </div>
    </header>

    <div class="flex gap-3 p-3 max-w-[1440px] mx-auto">
        <!-- 侧边栏 -->
        <aside class="sticky top-[4.25rem] h-[calc(100vh-5.5rem)] w-60 shrink-0 theme-sidebar rounded-2xl border shadow-2xl p-4 overflow-y-auto flex flex-col gap-5">

            <!-- 搜索 -->
            <form action="/" method="get" class="relative">
                <input type="text" name="q" value="{{ query or '' }}"
                       :placeholder="lang === 'zh' ? '搜索...' : 'Search...'"
                       class="w-full pl-9 pr-3 py-2 rounded-xl text-sm theme-input">
                <svg class="w-4 h-4 absolute left-3 top-2.5 text-[var(--muted)]" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/>
                </svg>
            </form>

            <!-- 知识图谱入口 -->
            <a href="/graph" class="flex items-center gap-2 px-3 py-2 rounded-xl text-sm font-medium
                      bg-gradient-to-r from-indigo-500/10 to-violet-500/10
                      border border-indigo-500/15
                      hover:from-indigo-500/18 hover:to-violet-500/18 hover:border-indigo-500/25
                      text-[var(--accent)] transition-all duration-200">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <circle cx="5" cy="5" r="2"/><circle cx="19" cy="5" r="2"/>
                    <circle cx="5" cy="19" r="2"/><circle cx="19" cy="19" r="2"/>
                    <path stroke-linecap="round" d="M5 7v10m14-10v3m-12 0h10M7 5h10M5 19h10"/>
                </svg>
                知识图谱
            </a>

            <!-- 分类 -->
            <div>
                <h3 class="text-[10px] font-semibold uppercase tracking-[0.18em] mb-3 flex items-center justify-between theme-label">
                    <span data-i18n="categories">分类</span>
                    <button @click="promptCategory()" class="hover:text-[var(--accent)] text-base leading-none transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
                        </svg>
                    </button>
                </h3>
                <ul class="space-y-0.5">
                    <li>
                        <a href="/" class="sidebar-item block px-3 py-2 rounded-lg text-sm transition-all duration-200"
                           :class="{ active: !currentCategory }" data-i18n="allNotes">全部笔记</a>
                    </li>
                    <template x-for="cat in allCategories" :key="cat.id">
                        <li class="group flex items-center">
                            <a :href="'/?category=' + cat.id" class="sidebar-item flex-1 block px-3 py-2 rounded-lg text-sm transition-all duration-200"
                               :class="{ active: currentCategory === cat.id }">
                                <span x-text="cat.name"></span>
                                <span class="text-[11px] sidebar-count ml-1.5" x-text="'(' + cat.article_count + ')'"></span>
                            </a>
                            <button @click="deleteCategory(cat)"
                                    class="shrink-0 w-5 h-5 rounded-full text-[10px] theme-muted hover:text-red-400 hover:bg-red-500/8
                                           opacity-0 group-hover:opacity-100 transition-all duration-200 flex items-center justify-center">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                                </svg>
                            </button>
                        </li>
                    </template>
                    <li x-show="allCategories.length === 0" class="text-xs theme-muted px-3 py-2" data-i18n="noCategories">暂无分类</li>
                </ul>
            </div>

            <!-- 标签 -->
            <div>
                <h3 class="text-[10px] font-semibold uppercase tracking-[0.18em] mb-3 flex items-center justify-between theme-label">
                    <span data-i18n="tags">标签</span>
                    <button @click="promptTag()" class="hover:text-[var(--accent)] text-base leading-none transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
                        </svg>
                    </button>
                </h3>
                <!-- 标签搜索 -->
                <input type="text" x-model="tagFilter"
                       :placeholder="lang === 'zh' ? '筛选标签...' : 'Filter tags...'"
                       class="w-full px-3 py-1.5 mb-2 rounded-lg text-xs theme-input">
                <div class="flex flex-wrap gap-1.5">
                    <template x-for="t in displayedTags" :key="t.id">
                        <a :href="'/?tag=' + t.id"
                           class="px-2.5 py-1 rounded-full text-xs transition-all duration-200 flex items-center gap-1"
                           :class="{ 'ring-2 ring-offset-2 ring-offset-[var(--bg-card)] font-medium': currentTag === t.id }"
                           :style="'background-color:' + t.color + '12; color:' + t.color + '; border: 1px solid ' + t.color + '20'">
                            <span x-text="t.name"></span>
                            <span class="opacity-50" style="color: inherit" x-text="'(' + t.article_count + ')'"></span>
                        </a>
                    </template>
                    <span x-show="filteredTags.length === 0 && allTagsRaw.length === 0" class="text-xs theme-muted" data-i18n="noTags">暂无标签</span>
                    <span x-show="filteredTags.length === 0 && allTagsRaw.length > 0 && tagFilter.trim()" class="text-xs theme-muted">
                        <span x-text="lang === 'zh' ? '无匹配标签' : 'No matching tags'"></span>
                    </span>
                </div>
                <!-- 折叠/展开按钮 -->
                <button x-show="hasMoreTags" @click="tagFold = !tagFold"
                        class="mt-2 text-xs theme-muted hover:text-[var(--accent)] transition-colors w-full text-center">
                    <span x-show="tagFold" x-text="lang === 'zh' ? '展开全部 (' + filteredTags.length + ')' : 'Show all (' + filteredTags.length + ')'"></span>
                    <span x-show="!tagFold" x-text="lang === 'zh' ? '收起' : 'Collapse'"></span>
                </button>
            </div>
        </aside>

        <!-- 主内容 -->
        <main class="flex-1 min-h-[calc(100vh-5.5rem)]">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- ====== 确认弹窗 ====== -->
    <div x-show="modal.show" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4"
         x-transition.opacity.duration.200>
        <div class="absolute inset-0 modal-overlay" @click="modal.show = false; modal.resolve(false)"></div>
        <div class="relative theme-modal rounded-2xl p-6 min-w-[340px] max-w-sm"
             x-show="modal.show"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 scale-95 translate-y-2"
             x-transition:enter-end="opacity-100 scale-100 translate-y-0">
            <p class="text-sm theme-text leading-relaxed" x-text="modal.message"></p>
            <div class="flex justify-end gap-2 mt-5">
                <button @click="modal.show = false; modal.resolve(false)"
                        class="px-4 py-2 rounded-xl text-sm theme-btn-ghost" data-i18n="cancel">取消</button>
                <button @click="modal.show = false; modal.resolve(true)"
                        class="px-4 py-2 rounded-xl text-sm font-medium text-white transition-all duration-200"
                        :class="modal.type === 'danger' ? 'bg-red-500/80 hover:bg-red-500 shadow-lg shadow-red-500/20' : 'bg-indigo-500 hover:bg-indigo-400 shadow-lg shadow-indigo-500/20'"
                        x-show="modal.type === 'danger'" data-i18n="confirmDelete">确认删除</button>
                <button @click="modal.show = false; modal.resolve(true)"
                        class="px-4 py-2 rounded-xl text-sm font-medium text-white bg-indigo-500 hover:bg-indigo-400 shadow-lg shadow-indigo-500/20 transition-all duration-200"
                        x-show="modal.type === 'info'" data-i18n="confirm">确定</button>
            </div>
        </div>
    </div>

    <!-- ====== 输入弹窗 ====== -->
    <div x-show="promptDialog.show" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4"
         x-transition.opacity.duration.200>
        <div class="absolute inset-0 modal-overlay" @click="promptDialog.show = false; promptDialog.resolve(null)"></div>
        <div class="relative theme-modal rounded-2xl p-6 min-w-[340px] max-w-sm"
             x-show="promptDialog.show"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 scale-95 translate-y-2"
             x-transition:enter-end="opacity-100 scale-100 translate-y-0">
            <label class="block text-sm theme-text-secondary mb-3" x-text="promptDialog.message"></label>
            <input type="text" x-model="promptDialog.value" x-ref="promptInput"
                   class="w-full px-3 py-2 rounded-xl text-sm theme-input"
                   @keydown.enter="promptDialog.show = false; promptDialog.resolve(promptDialog.value)"
                   :placeholder="lang === 'zh' ? '输入后按回车确认...' : 'Press Enter to confirm...'">
            <div class="flex justify-end gap-2 mt-4">
                <button @click="promptDialog.show = false; promptDialog.resolve(null)"
                        class="px-4 py-2 rounded-xl text-sm theme-btn-ghost" data-i18n="cancel">取消</button>
                <button @click="promptDialog.show = false; promptDialog.resolve(promptDialog.value)"
                        class="px-5 py-2 rounded-xl text-sm font-medium text-white bg-indigo-500 hover:bg-indigo-400 shadow-lg shadow-indigo-500/20 transition-all duration-200" data-i18n="confirm">确定</button>
            </div>
        </div>
    </div>

    <!-- ====== Toast ====== -->
    <div x-show="toast.show" x-cloak
         class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-5 py-2.5 rounded-xl text-sm font-medium shadow-2xl theme-modal border transition-all duration-300"
         x-text="toast.message"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 translate-y-4"
         x-transition:enter-end="opacity-100 translate-y-0"
         :class="toast.type === 'error' ? 'text-red-400' : 'text-[var(--text)]'">
    </div>

    <!-- ====== AI 设置弹窗 ====== -->
    <div x-show="showAiSettings" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4"
         x-transition.opacity.duration.200>
        <div class="absolute inset-0 modal-overlay" @click="showAiSettings = false"></div>
        <div class="relative theme-modal rounded-2xl p-6 w-full max-w-md max-h-[85vh] overflow-y-auto"
             x-show="showAiSettings"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 scale-95 translate-y-2"
             x-transition:enter-end="opacity-100 scale-100 translate-y-0">
            <div class="flex items-center justify-between mb-5">
                <h3 class="text-base font-semibold theme-text">AI 设置</h3>
                <button @click="showAiSettings = false" class="theme-muted hover:theme-text transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <div class="space-y-4">
                <!-- API Key -->
                <div>
                    <label class="flex items-center gap-2 text-xs theme-label mb-1.5">
                        DeepSeek API Key
                        <span x-show="aiConfig.hasKey && !aiConfig.apiKey"
                              class="inline-flex items-center gap-1 text-emerald-400">
                            <span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span>
                            已配置
                        </span>
                    </label>
                    <input x-model="aiConfig.apiKey" type="password"
                           class="w-full px-3 py-2 rounded-xl text-sm theme-input font-mono"
                           :placeholder="aiConfig.hasKey ? '已配置，输入新 Key 可覆盖...' : 'sk-...'">
                </div>

                <!-- 默认模型 -->
                <div>
                    <label class="block text-xs theme-label mb-1.5">默认模型</label>
                    <select x-model="aiConfig.model"
                            class="w-full rounded-xl px-3 py-2 text-sm theme-input cursor-pointer appearance-none
                                   bg-[url('data:image/svg+xml;charset=utf-8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2216%22 height=%2216%22 fill=%22%2394a3b8%22><path d=%22M4 6l4 4 4-4%22/></svg>')]
                                   bg-[length:16px] bg-[right_8px_center] bg-no-repeat pr-8">
                        <option value="deepseek-v4-flash">DeepSeek V4 Flash（快速）</option>
                        <option value="deepseek-v4-pro">DeepSeek V4 Pro（旗舰）</option>
                    </select>
                </div>

                <!-- 分场景模型 -->
                <div class="border-t pt-4" style="border-color: var(--border)">
                    <p class="text-xs theme-label mb-3">各场景模型（留空则使用默认模型）</p>
                    <div class="space-y-3">
                        <template x-for="(label, key) in {
                            generate: '文章生成',
                            summarize: '摘要生成',
                            polish: '内容润色',
                            tags: '标签建议',
                            related: '相关话题',
                            analyze: '知识分析',
                            plan: '体系规划',
                            organize: '笔记整理',
                            expand: '主题拆解'
                        }" :key="key">
                            <div>
                                <label class="block text-[11px] theme-label mb-1" x-text="label"></label>
                                <select :value="aiConfig.models[key] || ''"
                                        @change="aiConfig.models[key] = $event.target.value || undefined"
                                        class="w-full rounded-lg px-3 py-1.5 text-xs theme-input cursor-pointer appearance-none
                                               bg-[url('data:image/svg+xml;charset=utf-8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2216%22 height=%2216%22 fill=%22%2394a3b8%22><path d=%22M4 6l4 4 4-4%22/></svg>')]
                                               bg-[length:14px] bg-[right_6px_center] bg-no-repeat pr-7">
                                    <option value="">跟随默认</option>
                                    <option value="deepseek-v4-flash">DeepSeek V4 Flash（快速）</option>
                                    <option value="deepseek-v4-pro">DeepSeek V4 Pro（旗舰）</option>
                                </select>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <div class="flex justify-end gap-2 mt-6">
                <button @click="showAiSettings = false"
                        class="px-4 py-2 rounded-xl text-sm theme-btn-ghost">取消</button>
                <button @click="saveAiConfig()"
                        class="px-5 py-2 rounded-xl text-sm font-medium text-white bg-indigo-500 hover:bg-indigo-400 shadow-lg shadow-indigo-500/20 transition-all duration-200">
                    保存配置
                </button>
            </div>
        </div>
    </div>

    <script>
    // ====== i18n ======
    const I18N = {
        zh: {
            appName: '知识库', newNote: '新建笔记', aiWrite: 'AI',

    function t(key) {
        const lang = document.documentElement.lang === 'en' ? 'en' : 'zh';
        return I18N[lang][key] || key;
    }

    // 将 UTC 时间转换为用户本地时区显示
    function formatTime(isoString) {
        const d = new Date(isoString);
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        const h = String(d.getHours()).padStart(2, '0');
        const min = String(d.getMinutes()).padStart(2, '0');
        return `${y}-${m}-${day} ${h}:${min}`;
    }

    function formatLocalTimes() {
        document.querySelectorAll('time.local-time').forEach(el => {
            if (el.dateTime && !el.textContent) {
                el.textContent = formatTime(el.dateTime);
            }
        });
    }

    // 刷新所有带 data-i18n 的元素
    function refreshI18n() {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (el.tagName === 'INPUT' && el.hasAttribute('placeholder')) {
                el.placeholder = t(key);
            } else {
                el.textContent = t(key);
            }
        });
        // 更新 input placeholder
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
            el.placeholder = t(el.getAttribute('data-i18n-placeholder'));
        });
    }

    function app() {
        return {
            lang: 'zh',
            theme: 'dark',

            allCategories: [{% for cat in categories %}{id: {{ cat.id }}, name: {{ cat.name | tojson }}, article_count: {{ cat.article_count }}}{% if not loop.last %},{% endif %}{% endfor %}],
            allTagsRaw: [{% for t in tags %}{id: {{ t.id }}, name: {{ t.name | tojson }}, color: {{ t.color | tojson }}, article_count: {{ t.article_count }}}{% if not loop.last %},{% endif %}{% endfor %}],
            allTags: [],
            tagFilter: '',
            tagFold: true,
            get filteredTags() {
                let list = this.allTagsRaw;
                if (this.tagFilter.trim()) {
                    const q = this.tagFilter.trim().toLowerCase();
                    list = list.filter(t => t.name.toLowerCase().includes(q));
                }
                return list;
            },
            get displayedTags() {
                if (this.tagFilter.trim()) return this.filteredTags;
                return this.tagFold ? this.filteredTags.slice(0, 15) : this.filteredTags;
            },
            get hasMoreTags() {
                return !this.tagFilter.trim() && this.filteredTags.length > 15;
            },
            currentCategory: {{ current_category | tojson }},
            currentTag: {{ current_tag | tojson }},

            showAiSettings: false,
            aiConfig: { apiKey: '', model: 'deepseek-v4-flash', models: {}, hasKey: false },

            init() {
                window.__kb = this;  // 全局桥接，供子组件跨层级调用
                this.allTags = this.allTagsRaw;
                this.theme = localStorage.getItem('kb-theme') || 'dark';
                this.lang = localStorage.getItem('kb-lang') || 'zh';
                this.applyTheme();
                this.applyLang();
                // 从服务端同步配置
                this.syncConfig();
                this.loadAiConfig();
            },

            async loadAiConfig() {
                try {
                    const resp = await fetch('/api/config');
                    const cfg = await resp.json();
                    this.aiConfig.model = cfg.model || 'deepseek-v4-flash';
                    this.aiConfig.models = cfg.models || {};
                    this.aiConfig.hasKey = cfg.has_api_key;
                } catch(e) {}
            },

            async saveAiConfig() {
                try {
                    await fetch('/api/config/apikey', {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            api_key: this.aiConfig.apiKey,
                            model: this.aiConfig.model,
                            models: this.aiConfig.models,
                        }),
                    });
                    if (this.aiConfig.apiKey.trim()) {
                        this.aiConfig.hasKey = true;
                        this.aiConfig.apiKey = '';
                    }
                    this.showAiSettings = false;
                    this.showToast(
                        this.lang === 'zh' ? 'AI 配置已保存' : 'AI config saved',
                        'info'
                    );
                } catch {
                    this.showToast('Save failed', 'error');
                }
            },

            async syncConfig() {
                try {
                    const resp = await fetch('/api/config');
                    const cfg = await resp.json();
                    if (cfg.language && cfg.language !== this.lang) {
                        this.lang = cfg.language;
                        localStorage.setItem('kb-lang', this.lang);
                        this.applyLang();
                    }
                    if (cfg.theme && cfg.theme !== this.theme) {
                        this.theme = cfg.theme;
                        localStorage.setItem('kb-theme', this.theme);
                        this.applyTheme();
                    }
                } catch(e) {}
            },

            toggleLang() {
                this.lang = this.lang === 'zh' ? 'en' : 'zh';
                localStorage.setItem('kb-lang', this.lang);
                this.applyLang();
                fetch('/api/config', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({language: this.lang}),
                }).catch(() => {});
            },

            applyLang() {
                document.documentElement.lang = this.lang === 'zh' ? 'zh-CN' : 'en';
                this.$nextTick(() => { refreshI18n(); formatLocalTimes(); });
            },

            toggleTheme() {
                this.theme = this.theme === 'dark' ? 'light' : 'dark';
                localStorage.setItem('kb-theme', this.theme);
                this.applyTheme();
                fetch('/api/config', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({theme: this.theme}),
                }).catch(() => {});
            },

            applyTheme() {
                document.documentElement.setAttribute('data-theme', this.theme);
            },

            // === 弹窗 ===
            modal: { show: false, message: '', type: 'danger', resolve: null },
            async confirm(message, type = 'danger') {
                this.modal.message = message;
                this.modal.type = type;
                this.modal.show = true;
                return new Promise(r => { this.modal.resolve = r; });
            },

            promptDialog: { show: false, message: '', value: '', resolve: null },
            async askInput(message) {
                this.promptDialog.message = message;
                this.promptDialog.value = '';
                this.promptDialog.show = true;
                this.$nextTick(() => { this.$refs.promptInput.focus(); });
                return new Promise(r => { this.promptDialog.resolve = r; });
            },

            // === Toast ===
            toast: { show: false, message: '', type: 'info' },
            showToast(message, type = 'info', duration = 2000) {
                this.toast.message = message;
                this.toast.type = type;
                this.toast.show = true;
                setTimeout(() => { this.toast.show = false; }, duration);
            },

            // === 快捷操作 ===
            async deleteCategory(cat) {
                const msg = this.lang === 'zh'
                    ? `确认删除分类「${cat.name}」？分类下的笔记将变为未分类。`
                    : `Delete category "${cat.name}"? Notes will become uncategorized.`;
                const ok = await this.confirm(msg, 'danger');
                if (!ok) return;
                await fetch('/api/category/' + cat.id, {method: 'DELETE'});
                const idx = this.allCategories.findIndex(c => c.id === cat.id);
                if (idx >= 0) this.allCategories.splice(idx, 1);
                this.showToast(
                    this.lang === 'zh' ? '分类已删除' : 'Category deleted',
                    'info'
                );
            },

            async promptCategory() {
                const msg = this.lang === 'zh' ? '输入分类名称' : 'Enter category name';
                const name = await this.askInput(msg);
                if (!name) return;
                const resp = await fetch('/api/category', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name}),
                });
                if (resp.ok) {
                    const cat = await resp.json();
                    this.allCategories.push({id: cat.id, name: cat.name, article_count: 0});
                }
            },
            async promptTag() {
                const msg = this.lang === 'zh' ? '输入标签名称' : 'Enter tag name';
                const name = await this.askInput(msg);
                if (!name) return;
                const colors = ['#f87171','#fb923c','#fbbf24','#34d399','#38bdf8','#818cf8','#c084fc','#f472b6'];
                const color = colors[Math.floor(Math.random() * colors.length)];
                const resp = await fetch('/api/tag', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name, color}),
                });
                if (resp.ok) {
                    const tag = await resp.json();
                    this.allTagsRaw.push({id: tag.id, name: tag.name, color: tag.color, article_count: 0});
                }
            },
        };
    }

    document.addEventListener('DOMContentLoaded', () => { refreshI18n(); formatLocalTimes(); });
    </script>
